<div class="container">
    <h1 class="mt-3">Add Blog Post</h1>
     
    <form [formGroup]="addBlogPostForm" class="mt-3" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input title="title" type="text" class="form-control" formControlName="title">
      </div>

      <div class="mb-3">
        <label class="form-label">Short Description</label>
        <input placeholder="description" type="text" class="form-control" formControlName="shortDescription">
      </div>

      <div class="mb-3">
           <label class="form-label">URL Handle</label>
          <input placeholder="Url" type="text" class="form-control" formControlName="urlHandle">
      </div>

      

      <div class="mb-3"> <!-- container div for live markdown preview -->

       <div class="d-flex flex-row">
         <div class="col-6 p-2">
           <label class="form-label">Content</label>
           <textarea placeholder="content" class="form-control" formControlName="content" rows="5" ></textarea>
         </div>

         <div class="col-6 p-2" style="max-height: 350px; overflow-y: scroll;">
           <markdown [data]="addBlogPostForm.controls.content.getRawValue()"></markdown>
         </div>

        </div>
        
      </div>

      <div class="mb-3">
        <label class="form-label">Featured Image URL</label>

        @if(addBlogPostForm.controls.featuredImageUrl.getRawValue()){
          <div>
            <img style="width:200px" class="my-2" [src]="addBlogPostForm.controls.featuredImageUrl.getRawValue()"/>
          </div>
        }

        <input title="image" type="text" class="form-control" formControlName="featuredImageUrl">
      </div>

      <div class="feature mb-3">
        <label class="form-label">Author</label>
        <input title="author" type="text" class="form-control" formControlName="author">
      </div>

      <div class="feature mb-3">
        <label class="form-label">Published Date</label>
        <input title="date" type="date" class="form-control" formControlName="publishedDate">
      </div>

      <div class="feature mb-3">
        <div class="form-check">
         <input class="form-check-input" type="checkbox" value="" id="isVisible" formControlName="isVisible"/>
         <label class="form-check-label" for="isVisible">
           IsVisible
         </label>
        </div>
      </div>
      
      <div class="mb-3">
        <label class="form-label">Categories</label>
        <select class="form-control" multiple formControlName="categories">
          @for(category of categoriesResponse(); track category.id){
            <option [value]="category.id">{{category.name}}</option>
          }
        </select> 
      </div>

      <div class="feature mb-3">
        <button class="btn btn-primary" type="submit">Save</button>
      </div>
    </form>

</div>
